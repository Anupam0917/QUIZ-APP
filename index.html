<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f4f6f9;
    }

    nav {
      background: #333;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .container {
      width: 320px;
      margin: 100px auto;
      padding: 20px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      text-align: center;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }
  </style>
</head>

<body>

<nav>Quiz App</nav>

<div class="container">
  <h2>Login</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>
  <a href="register.html">Don't have an account? Register</a>
</div>

<script>
async function login() {
  try {
    const res = await fetch("http://localhost:5000/auth/login", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        email: document.getElementById("email").value,
        password: document.getElementById("password").value
      })
    });

    // 👇 handle non-JSON safely
    const text = await res.text();

    let data;
    try {
      data = JSON.parse(text);
    } catch {
      alert(text); // shows "User not found" or "Wrong password"
      return;
    }

    if (!data || data === "User not found" || data === "Wrong password") {
      alert(data);
      return;
    }

    // ✅ success
    localStorage.setItem("user", JSON.stringify(data));
    window.location.href = "dashboard.html";

  } catch (err) {
    console.error(err);
    alert("Server error. Make sure backend is running.");
  }
}
</script>

</body>
</html>
