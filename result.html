<!DOCTYPE html>
<html>
<head>
  <title>Result</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f4f6f9;
    }

    nav {
      background: #333;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .container {
      width: 60%;
      margin: 30px auto;
    }

    .summary {
      background: white;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      margin-bottom: 20px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .review {
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
      box-shadow: 0 0 5px rgba(0,0,0,0.1);
    }

    .correct {
      color: green;
    }

    .wrong {
      color: red;
    }
  </style>
</head>

<body>

<nav>Quiz Result</nav>

<div class="container" id="result"></div>

<script>
const data = JSON.parse(localStorage.getItem("result"));
const container = document.getElementById("result");

// summary
container.innerHTML += `
  <div class="summary">
    <h2>Your Score: ${data.percentage.toFixed(2)}%</h2>
    <p>${data.score} / ${data.total} correct</p>
  </div>
`;

// review
data.review.forEach((q, i) => {
  container.innerHTML += `
    <div class="review">
      <h4>Q${i + 1}. ${q.question}</h4>
      <p>Your Answer: 
        <span class="${q.isCorrect ? 'correct' : 'wrong'}">
          ${q.userAnswer || "Not Attempted"}
        </span>
      </p>
      <p>Correct Answer: <b>${q.correctAnswer}</b></p>
    </div>
  `;
});
</script>

</body>
</html>
